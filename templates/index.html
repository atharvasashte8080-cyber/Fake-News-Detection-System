<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TruthCheck AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .brand-logo { font-size: 2rem; font-weight: 700; color: #0d6efd; text-align: center; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">🛡️ TruthCheck</div>
    <p class="text-center text-muted mb-4">Verification System Login</p>
    
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" class="form-control" placeholder="name@college.edu" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3 fw-bold">Login to Dashboard</button>
        <p class="text-center small text-muted">Demo: Enter any details to proceed</p>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Verifying...";
        
        setTimeout(() => {
            // Change "dashboard.html" to just "/dashboard" 
            // This matches the @app.route('/dashboard') in your app.py
            window.location.href = "/dashboard"; 
        }, 1000);
    });
</script>
</body>
</html>
